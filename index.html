          "name": "¿Cuánto cuesta hacer una página web?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Depende del tipo: una landing page profesional empieza en 400€, una web corporativa entre 1.200€ y 3.500€, un e-commerce entre 2.500€ y 8.000€, y una aplicación web a medida desde 4.000€. Tienes el desglose completo de precios en mi artículo del blog."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto tarda en estar lista una página web?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Una landing page suele estar lista en 2-3 semanas. Una web corporativa entre 4-6 semanas. Un e-commerce o aplicación a medida pueden ir de 6 a 12 semanas según la complejidad. Trabajo con entregas por hitos para que veas el progreso desde la primera semana."
          }
        },
        {
          "@type": "Question",
          "name": "¿Trabajas solo en Galicia o en toda España?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trabajo de forma remota con clientes en toda España (y también internacionalmente). Estoy basado en Galicia, pero el 90% de mis proyectos se desarrollan completamente online, con videollamadas regulares y entregas digitales."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué incluye el mantenimiento mensual?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Actualizaciones de seguridad, copias de seguridad automatizadas, monitoreo de tiempo de actividad, correcciones de errores y un margen de horas para pequeños cambios de contenido. Desde 30€/mes según el tamaño del proyecto."
          }
        },
        {
          "@type": "Question",
          "name": "¿Optimizas la web para SEO desde el principio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, siempre. El SEO técnico (meta tags, structured data, sitemap, Core Web Vitals, schema markup, velocidad de carga) está incluido en todos mis desarrollos. No es un extra que se cobra aparte: una web sin SEO técnico es una web a medias."
          }
        },
        {
          "@type": "Question",
          "name": "¿También haces aplicaciones móviles?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Desarrollo aplicaciones móviles para iOS y Android, tanto nativas como cross-platform con React Native. Si tienes un proyecto que necesita web + app, lo coordinamos en un único desarrollo para que compartan backend y mantenimiento."
          }
        }
